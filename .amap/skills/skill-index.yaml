# TỰ ĐỘNG TẠO BỞI generate_index.py - KHÔNG CHỈNH SỬA THỦ CÔNG
skills:
  -
    name: architecture-reviewer
    version: '1.1'
    description: >
      Đối chiếu REQUIREMENT với kiến trúc + codebase thực tế (DB + code), phát hiện xung đột và rủi ro.
      Dùng khi cần đánh giá impact kiến trúc, phát hiện breaking changes, hoặc review contract design.
      KHÔNG dùng cho: chuẩn hoá yêu cầu (→ requirement-analyst),
      khám phá code chi tiết (→ codebase-explorer), validate spec đã sinh (→ spec-validator).
    pre_conditions:
      - file: "{{ platform.framework_root }}/knowledge/active/REQUIREMENT.md"
        condition: not_skeleton
        on_fail: "ABORT — chạy requirement-analyst trước"
      - file: "{{ platform.framework_root }}/knowledge/active/EXPLORE_CONTEXT.md"
        condition: not_skeleton
        on_fail: "WARN — EXPLORE_CONTEXT thiếu, độ tin cậy kiến trúc sẽ là TRUNG BÌNH — cân nhắc chạy db-explorer / codebase-explorer trước"
      - file: "{{ platform.framework_root }}/knowledge/long-term/conventions.yaml"
        condition: exists
        on_fail: "WARN — conventions.yaml chưa có, đánh giá boundary không đầy đủ"
        load_scope: full  # override selective loading — arch-reviewer cần toàn bộ design_patterns
      - file: "{{ platform.framework_root }}/knowledge/long-term/author-dna.yaml"
        condition: exists
        on_fail: "WARN — author-dna.yaml chưa có, hard principles không được áp dụng"
        load_scope: hard_principles+complexity_thresholds  # pattern_preferences không cần ở Pha 1
  -
    name: author-dna-builder
    version: '1.0'
    description: >
      Phân tích codebase để infer coding philosophy và style của tác giả,
      sau đó interview để confirm/bổ sung, encode thành author-dna.yaml.
      Skill này tạo ra "judgment layer" — lens mà agent dùng khi evaluate design và propose solution.
      Dùng khi onboard project hoặc cần cập nhật coding DNA sau kiến trúc thay đổi lớn.
      KHÔNG dùng cho: scan convention (→ convention-intelligence-builder),
      tra cứu DNA đã có (→ đọc trực tiếp author-dna.yaml), review kiến trúc (→ architecture-reviewer).
    trigger: /dna-scan
    approve_trigger: /approve-dna
  -
    name: codebase-explorer
    version: '1.0'
    description: >
      Khám phá codebase bằng Socraticode + Understand-Anything để map REQUIREMENT → module/service/file liên quan.
      Dùng khi cần tìm module, file, dependency liên quan đến requirement hiện tại.
      KHÔNG dùng cho: khám phá DB schema (→ db-explorer),
      review kiến trúc/rủi ro (→ architecture-reviewer), sinh spec (→ openspec-propose).
    pre_conditions:
      - file: "{{ platform.framework_root }}/knowledge/active/REQUIREMENT.md"
        condition: not_skeleton
        on_fail: "ABORT — chạy requirement-analyst trước"
      - file: "{{ platform.framework_root }}/knowledge/active/EXPLORE_CONTEXT.md"
        condition: exists
        on_fail: "WARN — EXPLORE_CONTEXT chưa có, tạo skeleton trước khi ghi"
  -
    name: convention-intelligence-builder
    version: '1.0'
    description: >
      Scan codebase qua UA + Socraticode để extract naming conventions, class suffix patterns,
      và layer-specific design principles. Sinh conventions.draft.yaml để user review trước khi approve.
      Dùng khi onboard project mới hoặc sau refactor lớn cần cập nhật conventions.
      KHÔNG dùng cho: viết convention thủ công (→ edit trực tiếp conventions.yaml),
      review kiến trúc/rủi ro (→ architecture-reviewer), infer coding philosophy (→ author-dna-builder).
  -
    name: db-explorer
    version: '1.0'
    description: >
      Khám phá logic tầng database (SQL + NoSQL) bằng MCP db-remote để cập nhật EXPLORE_CONTEXT.
      Dùng khi cần hiểu schema, constraint, data flow ở tầng DB cho task hiện tại.
      KHÔNG dùng cho: khám phá code/module (→ codebase-explorer),
      review kiến trúc tổng thể (→ architecture-reviewer), viết tài liệu (→ document-writer).
    pre_conditions:
      - file: "{{ platform.framework_root }}/knowledge/active/REQUIREMENT.md"
        condition: not_skeleton
        on_fail: "ABORT — chạy requirement-analyst trước"
      - tool: db-remote
        condition: exists
        on_fail: "WARN — không có DB access, ghi vào AGENT_TRANSPARENCY và hạ Độ tin cậy xuống THẤP"
  -
    name: document-writer
    version: '1.0'
    description: >
      Khung chuẩn để tạo mới hoặc cập nhật tài liệu kỹ thuật cho nhiều loại tài liệu:
      README, overview, architecture/design doc, how-to, runbook, ADR, và tài liệu module hạ tầng.
      Dùng khi cần tạo, viết lại, hoặc cập nhật tài liệu kỹ thuật trong dự án.
      KHÔNG dùng cho: viết TDD 5 tầng (→ infra-tdd), sinh spec OpenSpec (→ openspec-propose),
      chuẩn hoá requirement (→ requirement-analyst).
  -
    name: infra-tdd
    version: '1.0'
    description: >
      Xây dựng Technical Design Document (TDD) chuẩn hoá theo 5 tầng hybrid:
      Bối cảnh Nghiệp vụ, Chiến lược, Kiến trúc, Quyết định, và Vận hành.
      Dùng khi cần thiết kế, viết hoặc review TDD / Design Doc / RFC / ADR cho module infrastructure.
      KHÔNG dùng cho: README/how-to/runbook (→ document-writer),
      spec OpenSpec (→ openspec-propose), review kiến trúc (→ architecture-reviewer).
    license: MIT
    metadata:
      author: project-team
      version: '2.5'
      language: vi
      based-on: infra-tdd-template by perplexity-computer
  -
    name: knowledge-curator
    version: '1.1'
    description: >
      Quản lý vòng đời knowledge — archive context hoàn thành, reset active/, cập nhật knowledge-snapshot sau mỗi task.
      Dùng khi task hoàn thành cần archive, hoặc cần reset/rotate context.
      KHÔNG dùng cho: review kiến trúc (→ architecture-reviewer),
      sinh/validate spec (→ openspec-propose, spec-validator), viết tài liệu (→ document-writer).
  -
    name: openspec-archive-change
    version: '1.0'
    description: >
      Archive a completed change in the experimental workflow. Use when the user wants to finalize and archive a change after implementation is complete.
      NOT for: archiving knowledge-layer context (→ knowledge-curator),
      post-apply review/validation (→ spec-validator).
    license: MIT
    compatibility: Requires openspec CLI.
    metadata:
      author: openspec
      version: "1.0"
      generatedBy: "1.2.0"
  -
    name: openspec-explore
    version: '1.0'
    description: >
      Enter explore mode - a thinking partner for exploring ideas, investigating problems, and clarifying requirements.
      Use when the user wants to think through something before or during a change. No code writing.
      NOT for: formalized requirements (→ requirement-analyst),
      generating specs/artifacts (→ openspec-propose), architecture review (→ architecture-reviewer).
    license: MIT
    compatibility: Requires openspec CLI.
    metadata:
      author: openspec
      version: "1.0"
      generatedBy: "1.2.0"
  -
    name: openspec-propose
    version: '1.0'
    description: >
      Propose a new change with all artifacts generated in one step.
      Use when the user wants to quickly describe what they want to build and get a complete proposal with design, specs, and tasks ready for implementation.
      NOT for: exploring ideas/brainstorming (→ openspec-explore),
      validating existing specs (→ spec-validator), writing TDD documents (→ infra-tdd).
    license: MIT
    compatibility: Requires openspec CLI.
    metadata:
      author: openspec
      version: "1.0"
      generatedBy: "1.2.0"
    pre_conditions:
      - file: "{{ platform.framework_root }}/knowledge/active/REQUIREMENT.md"
        condition: not_skeleton
        on_fail: "ABORT — chạy requirement-analyst trước"
      - file: "{{ platform.framework_root }}/knowledge/active/EXPLORE_CONTEXT.md"
        condition: not_skeleton
        on_fail: "WARN — EXPLORE_CONTEXT thiếu, spec sẽ có Độ tin cậy THẤP"
      - phase: pha-1
        condition: phase_done
        on_fail: "ABORT — Pha 1 chưa hoàn thành (kiểm tra marker `Pha 1 DONE` trong AGENT_TRANSPARENCY)"
  -
    name: requirement-analyst
    version: '1.1'
    description: >
      Phân tích ticket/tài liệu thành REQUIREMENT.md chuẩn hoá, rõ scope và Acceptance Criteria.
      Dùng khi có ticket link hoặc tài liệu PRD rõ ràng cần chuẩn hoá.
      KHÔNG dùng cho: ideation thô chưa thành ticket (→ openspec-explore),
      extract từ wiki/Confluence dài nhiều trang (→ spec-extract),
      review kiến trúc hoặc đánh giá rủi ro (→ architecture-reviewer).
    pre_conditions:
      - file: "{{ platform.framework_root }}/knowledge/active/AGENT_TRANSPARENCY.md"
        condition: exists
        on_fail: "ABORT — bootstrap chưa chạy, gọi `/task` trước"
      - input: ticket_id_or_doc_url
        condition: not_empty
        on_fail: "ABORT — thiếu ticket ID hoặc URL tài liệu"
  -
    name: spec-extract
    version: '1.0'
    description: >
      Trích xuất spec có cấu trúc từ tài liệu (wiki/Confluence/PRD) vào REQUIREMENT.md, kèm đánh giá độ tin cậy.
      Dùng khi đầu vào là tài liệu dài, wiki nhiều trang, hoặc PRD cần parse.
      KHÔNG dùng cho: ticket có sẵn đã rõ scope (→ requirement-analyst),
      ideation/brainstorm (→ openspec-explore), khám phá DB schema (→ db-explorer).
  -
    name: spec-validator
    version: '1.1'
    description: >
      Kiểm tra spec (OpenSpec artifacts) trước và sau khi apply — pre-apply gate, AC coverage check, post-apply verify.
      Dùng khi cần validate spec trước apply hoặc verify kết quả sau apply.
      KHÔNG dùng cho: sinh spec mới (→ openspec-propose),
      review kiến trúc (→ architecture-reviewer), chuẩn hoá yêu cầu (→ requirement-analyst).
    pre_conditions:
      - file: "{{ platform.framework_root }}/knowledge/active/REQUIREMENT.md"
        condition: not_skeleton
        on_fail: "ABORT — không có REQUIREMENT để validate spec"
      - phase: pha-2
        condition: phase_done
        on_fail: "ABORT — spec chưa được sinh (phase_state chưa đạt phase-2-done)"
