<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f42c1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#6f42c1" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradient)" />

  <!-- Background Tech Grid Overlay -->
  <g stroke="#ffffff" stroke-width="1" stroke-opacity="0.03">
    <path d="M0,50 L1200,50 M0,100 L1200,100 M0,150 L1200,150 M0,200 L1200,200 M0,250 L1200,250" />
    <path d="M100,0 L100,300 M200,0 L200,300 M300,0 L300,300 M400,0 L400,300 M500,0 L500,300 M600,0 L600,300 M700,0 L700,300 M800,0 L800,300 M900,0 L900,300 M1000,0 L1000,300 M1100,0 L1100,300" />
  </g>

  <!-- Brain Tech Icon -->
  <g transform="translate(80, 50)" filter="url(#glow)">
    <g fill="none" stroke="url(#iconGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left Hemisphere -->
      <path d="M100,160 C70,160 40,140 40,100 C40,70 60,40 100,40 C110,40 120,45 130,50" />
      <path d="M40,100 C20,100 10,80 15,60" />
      <path d="M100,40 C90,20 110,10 130,20" />
      
      <!-- Right Hemisphere -->
      <path d="M160,160 C190,160 220,140 220,100 C220,70 200,40 160,40 C150,40 140,45 130,50" />
      <path d="M220,100 C240,100 250,80 245,60" />
      <path d="M160,40 C170,20 150,10 130,20" />

      <!-- Center Spine / Connections -->
      <path d="M130,50 L130,150" stroke-width="3" stroke-dasharray="6 6" />
      
      <!-- Inner Synapse Lines -->
      <path d="M130,100 L90,80" stroke-width="2.5" />
      <path d="M130,100 L170,80" stroke-width="2.5" />
      <path d="M130,100 L100,130" stroke-width="2.5" />
      <path d="M130,100 L160,130" stroke-width="2.5" />
      <path d="M130,100 L80,120" stroke-width="2.5" />
      <path d="M130,100 L180,120" stroke-width="2.5" />
      <path d="M90,80 L100,50" stroke-width="2.5" />
      <path d="M170,80 L160,50" stroke-width="2.5" />
    </g>

    <!-- Nodes (Dots) -->
    <circle cx="130" cy="50" r="5" fill="#0ea5e9" />
    <circle cx="130" cy="100" r="7" fill="#4f46e5" />
    <circle cx="130" cy="150" r="5" fill="#6f42c1" />
    
    <circle cx="90" cy="80" r="4" fill="#0ea5e9" />
    <circle cx="170" cy="80" r="4" fill="#6f42c1" />
    <circle cx="100" cy="130" r="4" fill="#4f46e5" />
    <circle cx="160" cy="130" r="4" fill="#4f46e5" />
    <circle cx="80" cy="120" r="3" fill="#0ea5e9" />
    <circle cx="180" cy="120" r="3" fill="#6f42c1" />
    <circle cx="100" cy="50" r="3" fill="#0ea5e9" />
    <circle cx="160" cy="50" r="3" fill="#6f42c1" />
    
    <!-- Outer boundary nodes -->
    <circle cx="40" cy="100" r="4" fill="#0ea5e9" />
    <circle cx="220" cy="100" r="4" fill="#6f42c1" />
    <circle cx="100" cy="160" r="4" fill="#4f46e5" />
    <circle cx="160" cy="160" r="4" fill="#4f46e5" />
    <circle cx="15" cy="60" r="3" fill="#0ea5e9" />
    <circle cx="245" cy="60" r="3" fill="#6f42c1" />
  </g>

  <!-- Typography -->
  <g transform="translate(380, 130)" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="92" font-weight="800" fill="url(#textGradient)" letter-spacing="4">AMAP</text>
    <text x="0" y="55" font-size="34" font-weight="600" fill="#e6edf3" letter-spacing="1">Agent Memory Architecture Protocol</text>
    <text x="4" y="105" font-size="18" font-weight="500" fill="#8b949e" letter-spacing="3" text-transform="uppercase">Memory · Workflow · Guardrails · Audit trail</text>
  </g>
</svg>
