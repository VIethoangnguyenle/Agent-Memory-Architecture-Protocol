# Provider: Knowledge Graph MCP Server (understand-anything)
# Priority: 1 (ưu tiên cao nhất cho code exploration)
# Yêu cầu: understand-anything MCP server đang chạy + project đã onboard

provider: kg-mcp
capability: code_exploration
priority: 1

detection:
  method: "Gọi get_graph_stats() — nếu trả về node/edge count > 0 → available"
  fallback_signal: "Tool không tồn tại hoặc graph rỗng → chuyển sang provider tiếp theo"

requires:
  - "understand-anything MCP server"
  - "Project đã được onboard vào KG (chạy /understand-onboard trước)"

# Mapping: abstract operation → concrete tool call
mapping:
  check_availability:
    tool: get_graph_stats
    params: {}
    notes: "Trả về node_count, edge_count, last_updated. node_count > 0 = healthy."

  search_code:
    tool: query_nodes
    params:
      query: "{query}"
    notes: "Fuzzy search, hỗ trợ phân trang. Trả về node_id để dùng tiếp."

  get_source:
    tool: get_node_source
    params:
      node_id: "{identifier}"
    notes: "Đọc source code thực tế từ graph node. Luôn ghi node_id vào EXPLORE_CONTEXT."

  get_dependencies:
    tool: get_relationships
    params:
      node_id: "{identifier}"
      direction: "{direction}"  # 'in', 'out', hoặc 'both'
    notes: "Trả về imports, calls, extends, implements relationships."

  trace_flow:
    tool: trace_call_chain
    params:
      node_id: "{identifier}"
    notes: "Trace execution flow từ entry point xuống."

  find_blast_radius:
    tool: find_impact
    params:
      node_id: "{identifier}"
    notes: "Reverse dependency analysis — ai bị ảnh hưởng nếu sửa node này."

  get_detail:
    tool: get_node_detail
    params:
      node_id: "{identifier}"
    notes: "Metadata: layer, complexity, tags, relationship count."

# Ưu điểm so với alternatives:
# - Structured query (không phải text search)
# - Dependency graph chính xác (không suy luận từ grep)
# - Blast radius analysis
# - Domain-aware (layer, domain grouping)
