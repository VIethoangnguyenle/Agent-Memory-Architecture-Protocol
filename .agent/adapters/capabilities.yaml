# Adapter Capabilities — Abstract operations cho skills
# Skills tham chiếu capability.operation thay vì hardcode tool names.
# Agent resolve operation → provider cụ thể thông qua registry.yaml.
#
# Cách dùng trong SKILL.md:
#   "Gọi `code_exploration.search_code(query=...)` để tìm module liên quan."
#   Agent đọc registry → resolve tới provider (KG MCP, Socraticode, grep)
#   → gọi tool tương ứng.

capabilities:

  # ═══════════════════════════════════════════════════════════════
  # 1. CODE EXPLORATION — Tìm kiếm, truy vấn, phân tích codebase
  # ═══════════════════════════════════════════════════════════════
  code_exploration:
    description: >
      Tìm kiếm, truy vấn codebase để hiểu cấu trúc, dependency,
      và execution flow. Dùng trong codebase-explorer,
      architecture-reviewer, convention-intelligence-builder.
    operations:
      - name: check_availability
        description: Kiểm tra tool có sẵn và dữ liệu còn mới (freshness)
        returns: "health status, node/edge count, last update"

      - name: search_code
        description: Tìm module/file/class/function liên quan đến query
        params: [query, filters]
        returns: "danh sách kết quả (id, name, path, relevance)"

      - name: get_source
        description: Đọc source code thực tế của một component
        params: [identifier]
        returns: "source code text"

      - name: get_dependencies
        description: Xem dependency in/out của một component
        params: [identifier, direction]
        returns: "danh sách dependency (id, name, relation_type)"

      - name: trace_flow
        description: Trace execution flow từ entry point
        params: [identifier, depth]
        returns: "call chain tree"

      - name: find_blast_radius
        description: Impact analysis — component nào bị ảnh hưởng nếu sửa target
        params: [identifier, depth]
        returns: "danh sách affected components"

      - name: get_detail
        description: Chi tiết component (layer, complexity, tags)
        params: [identifier]
        returns: "metadata chi tiết"

  # ═══════════════════════════════════════════════════════════════
  # 2. DB ACCESS — Đọc schema, constraint, sample data
  # ═══════════════════════════════════════════════════════════════
  db_access:
    description: >
      Truy cập database ở chế độ read-only để khám phá schema,
      constraint, trigger, sample data. Dùng trong db-explorer.
    operations:
      - name: check_availability
        description: Kiểm tra kết nối DB có sẵn không
        returns: "connection status"

      - name: list_tables
        description: Liệt kê bảng/collection trong database
        params: [schema, filter]
        returns: "danh sách table names"

      - name: describe_table
        description: Xem cấu trúc bảng (columns, types, constraints)
        params: [table_name]
        returns: "column definitions + constraints"

      - name: query_sample
        description: Lấy sample data (read-only, không PII)
        params: [table_name, limit, conditions]
        returns: "rows (max limit)"

      - name: list_constraints
        description: Liệt kê FK, unique, check constraints
        params: [table_name]
        returns: "constraint definitions"

      - name: describe_procedures
        description: Xem stored procedures, triggers liên quan
        params: [filter]
        returns: "procedure/trigger definitions"

  # ═══════════════════════════════════════════════════════════════
  # 3. DOCUMENT SEARCH — Tìm kiếm tài liệu wiki/Confluence/KB
  # ═══════════════════════════════════════════════════════════════
  document_search:
    description: >
      Tìm kiếm và đọc tài liệu từ wiki, Confluence, hoặc
      knowledge base bên ngoài. Dùng trong spec-extract.
    operations:
      - name: check_availability
        description: Kiểm tra wiki/KB có truy cập được không
        returns: "connection status"

      - name: search_docs
        description: Tìm kiếm tài liệu theo từ khoá
        params: [query, limit]
        returns: "danh sách kết quả (id, title, excerpt)"

      - name: get_page
        description: Đọc nội dung một trang tài liệu
        params: [page_id]
        returns: "page content (HTML/text)"

      - name: list_spaces
        description: Liệt kê spaces/namespaces có sẵn
        returns: "danh sách spaces"
