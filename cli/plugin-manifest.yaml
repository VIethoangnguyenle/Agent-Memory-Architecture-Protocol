# AMAP Plugin Manifest
# Each plugin is a unit of framework content that gets scaffolded into target projects.
# Plugins can be:
#   - static (copy as-is)
#   - template (render with Jinja2 using platform context)
#   - directory (copy entire directory)
#
# requires_capability: if set, plugin is only included when user selects
# an MCP server providing that capability.

version: "3.0"

# ═══════════════════════════════════════════════════════════
# MCP Capabilities — which MCP server provides what
# ═══════════════════════════════════════════════════════════
mcp_capabilities:
  socraticode:
    provides: code_exploration
    display: "Socraticode — Semantic code search + dependency graph"

  confluence:
    provides: document_search
    display: "Confluence — Wiki/document search"

  db-remote:
    provides: db_access
    display: "DB Remote — Database schema exploration (read-only)"

  understand-anything:
    provides: code_exploration
    display: "Understand Anything — Knowledge Graph (alternative to Socraticode)"

# ═══════════════════════════════════════════════════════════
# Supported Languages
# ═══════════════════════════════════════════════════════════
languages:
  - java
  - typescript
  - python
  - go
  - csharp
  - other

# ═══════════════════════════════════════════════════════════
# Plugins
# ═══════════════════════════════════════════════════════════
plugins:

  # ─── META-PROMPT ───
  - name: agents-md
    type: meta-prompt
    source: meta-prompt.md
    template: false
    output: "{{ platform.config_entry_point }}"

  # ─── RULES (mostly static) ───
  - name: rules-manifest
    type: rule
    source: rules/RULES.md
    template: false
    output: "{{ platform.framework_root }}/rules/RULES.md"

  - name: rules-flow
    type: rule
    source: rules/rules-flow.md
    template: false
    output: "{{ platform.framework_root }}/rules/rules-flow.md"

  - name: rules-tool
    type: rule
    source: rules/rules-tool.md
    template: false
    output: "{{ platform.framework_root }}/rules/rules-tool.md"

  - name: rules-exec
    type: rule
    source: rules/rules-exec.md
    template: false
    output: "{{ platform.framework_root }}/rules/rules-exec.md"

  - name: rules-knowledge
    type: rule
    source: rules/rules-knowledge.md
    template: false
    output: "{{ platform.framework_root }}/rules/rules-knowledge.md"

  - name: rules-guard
    type: rule
    source: rules/rules-guard.md
    template: false
    output: "{{ platform.framework_root }}/rules/rules-guard.md"

  # ─── SKILLS ───
  - name: requirement-analyst
    type: skill
    source: skills/requirement-analyst/
    template: false
    output: "{{ platform.framework_root }}/skills/requirement-analyst/"
    copy_dir: true

  - name: spec-extract
    type: skill
    source: skills/spec-extract/
    template: false
    output: "{{ platform.framework_root }}/skills/spec-extract/"
    copy_dir: true

  - name: db-explorer
    type: skill
    source: skills/db-explorer/
    template: false
    output: "{{ platform.framework_root }}/skills/db-explorer/"
    copy_dir: true
    requires_capability: db_access

  - name: codebase-explorer
    type: skill
    source: skills/codebase-explorer/
    template: false
    output: "{{ platform.framework_root }}/skills/codebase-explorer/"
    copy_dir: true
    requires_capability: code_exploration

  - name: architecture-reviewer
    type: skill
    source: skills/architecture-reviewer/
    template: false
    output: "{{ platform.framework_root }}/skills/architecture-reviewer/"
    copy_dir: true

  - name: knowledge-curator
    type: skill
    source: skills/knowledge-curator/
