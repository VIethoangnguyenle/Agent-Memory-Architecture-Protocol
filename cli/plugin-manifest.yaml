    output: "{{ platform.framework_root }}/skills/knowledge-curator/"
    copy_dir: true

  - name: convention-intelligence-builder
    type: skill
    source: skills/convention-intelligence-builder/
    template: false
    output: "{{ platform.framework_root }}/skills/convention-intelligence-builder/"
    copy_dir: true

  - name: author-dna-builder
    type: skill
    source: skills/author-dna-builder/
    template: false
    output: "{{ platform.framework_root }}/skills/author-dna-builder/"
    copy_dir: true

  - name: spec-validator
    type: skill
    source: skills/spec-validator/
    template: false
    output: "{{ platform.framework_root }}/skills/spec-validator/"
    copy_dir: true

  - name: document-writer
    type: skill
    source: skills/document-writer/
    template: false
    output: "{{ platform.framework_root }}/skills/document-writer/"
    copy_dir: true

  - name: infra-tdd
    type: skill
    source: skills/infra-tdd/
    template: false
    output: "{{ platform.framework_root }}/skills/infra-tdd/"
    copy_dir: true

  - name: openspec-explore
    type: skill
    source: skills/openspec-explore/
    template: false
    output: "{{ platform.framework_root }}/skills/openspec-explore/"
    copy_dir: true

  - name: openspec-propose
    type: skill
    source: skills/openspec-propose/
    template: false
    output: "{{ platform.framework_root }}/skills/openspec-propose/"
    copy_dir: true

  - name: openspec-archive-change
    type: skill
    source: skills/openspec-archive-change/
    template: false
    output: "{{ platform.framework_root }}/skills/openspec-archive-change/"
    copy_dir: true

  # ─── WORKFLOWS ───
  - name: workflow-task
    type: workflow
    source: workflows/task.md
    template: false
    output: "{{ platform.framework_root }}/workflows/task.md"

  - name: workflow-idea-to-task
    type: workflow
    source: workflows/idea-to-task.md
