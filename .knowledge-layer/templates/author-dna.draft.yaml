# ─────────────────────────────────────────────────────────────────
# SECTION 4: Pattern Preferences
# Design pattern nào tác giả prefer cho từng use case.
# ─────────────────────────────────────────────────────────────────
pattern_preferences:
  - use_case: "Validation pipeline trong transaction handler"
    preferred_pattern: "Chain of Responsibility (ValidationProcessorChain)"
    instead_of: "Sequential validation trong handler method"
    confirmed: false
    occurrence_in_codebase: 15
    exemplar:
      node_id: ""
      file_path: "transaction/data/src/main/java/vn/vnpay/omni/transaction/data/chain/ValidationProcessorChain.java"
    agent_instruction: >
      Khi handler mới cần validation, LUÔN tạo ValidationProcessor records
      và compose qua buildValidationProcessorChain(). Không viết validation
      inline trong handler.

  - use_case: "Dispatch business logic theo service code / type"
    preferred_pattern: "Executor + Manager (Map-based lookup)"
    instead_of: "if/else-if chain hoặc switch/case"
    confirmed: false
    occurrence_in_codebase: 6
    exemplar:
      node_id: ""
      file_path: "transaction/business/src/main/java/vn/vnpay/omni/transaction/business/module/confirm_transaction/executor/BaseTransactionConfirmExecutorManager.java"
    agent_instruction: >
      Khi phát hiện >2 case xử lý khác nhau theo service code,
      SUGGEST Executor/Manager pattern. Executor tự register qua getConfigs().

  - use_case: "Tạo framework cho business handler/executor"
    preferred_pattern: "Template Method (abstract Base class + protected hooks)"
    instead_of: "Interface-only hoặc flat composition"
    confirmed: false
    occurrence_in_codebase: 20
    exemplar:
      node_id: ""
      file_path: "transaction/business/financial/src/main/java/vn/vnpay/omni/transaction/business/financial/module/action/init/handler/BaseInitFinancialTransReqHandler.java"
    agent_instruction: >
      Khi tạo handler/executor mới, PHẢI tạo Base abstract class trước
      với protected hooks. Concrete class chỉ override hooks cần thiết.

  - use_case: "Post-processing sau business operation"
    preferred_pattern: "Spring Event (publish success/failure events)"
    instead_of: "Inline side-effects trong handler/executor"
    confirmed: true
    occurrence_in_codebase: 4
    exemplar:
      node_id: ""
      file_path: "transaction/business/financial/src/main/java/vn/vnpay/omni/transaction/business/financial/module/action/confirm/executor/BaseFinancialTransactionConfirmExecutor.java"
    agent_instruction: >
      MINDSET: Event-driven post-processing nghĩa là sự thành công/thất bại
      của logic SAU event sẽ KHÔNG ảnh hưởng tới kết quả trả cho client.
      Dùng event khi side-effect (notification, audit, cache evict, sync)
      có thể fail mà không ảnh hưởng business result.
      KHÔNG dùng event cho logic mà kết quả trả cho client phụ thuộc vào nó.
    author_note: "Sự thành công thất bại của logic sau event không ảnh hưởng tới kết quả trả cho client"

