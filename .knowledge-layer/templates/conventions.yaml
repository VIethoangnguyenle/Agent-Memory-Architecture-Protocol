# ─────────────────────────────────────────────
# SECTION 8: Coding Philosophy
# Triết lý code — tư duy trước, code sau.
# Không phải code mẫu, mà là kim chỉ nam suy nghĩ.
# Learned from: Phiên review LimitAdjustment (2026-06-09)
# Reference module: transaction (gold standard)
# ─────────────────────────────────────────────
coding_philosophy:

  # --- Triết lý tổng quan ---
  core_principle: >
    Hiểu WHY trước khi áp HOW. Không áp rule máy móc.
    Mỗi quyết định thiết kế phải trả lời được: tại sao chọn cách này thay vì cách kia?

  rules:
    # --- Framework Trust ---
    - id: CP-01
      name: "Tin tưởng framework — override hook, không bypass"
      weight: mandatory
      principle: >
        Framework đã cung cấp lifecycle hooks (listQuery, getEntity, deleteQuery, convertToModel...).
        Khi cần tùy chỉnh behavior, luôn override hook thay vì viết method riêng gọi repository trực tiếp.
        Bypass hook = bypass cache invalidation + audit + lifecycle management.
      question_to_ask: "Behavior này đã có hook trong base class chưa? Nếu có → override, không viết mới."

    - id: CP-02
      name: "Custom method chỉ khi tạo giá trị mới"
      weight: recommended
      principle: >
        Method custom trong Factory chỉ hợp lệ khi nó compose nhiều framework API + domain rule
        để tạo giá trị mà caller không thể tự làm. Nếu method chỉ là alias của 1 hook → nó không
        nên tồn tại.
      checklist:
        - "Có compose nhiều API + domain rule không?"
        - "Có quản lý cache/session riêng không?"
        - "Hay chỉ duplicate hook bằng cách gọi repo trực tiếp?"

    # --- Immutability & Clean Code ---
    - id: CP-03
      name: "Ưu tiên immutability — builder/toBuilder thay vì setter"
      weight: recommended
      principle: >
        Object nên immutable. Khi cần thay đổi state, tạo bản mới qua toBuilder() thay vì mutate
        tại chỗ bằng setter. Immutable = dễ trace data flow, không side-effect ngầm, thread-safe.
      exception: "Setter chỉ dùng khi class không hỗ trợ toBuilder() (third-party DTO, gRPC builder)."

    - id: CP-04
      name: "Ưu tiên Optional cho null handling"
      weight: recommended
      principle: >
        Dùng Optional.ofNullable() thay vì raw null check (if != null) hoặc Objects.nonNull().
        Optional thể hiện intent rõ ràng: giá trị này CÓ THỂ vắng mặt, và em đang xử lý
        trường hợp đó một cách có chủ đích.

    - id: CP-05
      name: "Tên biến phải descriptive — đọc tên biết chứa gì"
      weight: recommended
      principle: >
        Không viết tắt 1 ký tự (m, e, stm). Tên biến phải truyền tải đủ ý nghĩa để người đọc
        không cần trace ngược lại type declaration. Đây là nền tảng của code readability.

    # --- Error Discipline ---
    - id: CP-06
      name: "Chỉ throw VnpayInvalidException — không bao giờ RuntimeException"
      weight: mandatory
      principle: >
        RuntimeException là escape hatch phá vỡ error contract của framework. Mọi lỗi nghiệp vụ
        phải thông qua VnpayInvalidException với IErrorCode cụ thể. Nếu thấy mình cần RuntimeException,
        đó là dấu hiệu đang bypass framework.

    - id: CP-07
      name: "getModel vs getModelOrNull — chọn đúng method theo intent"
      weight: mandatory
      principle: >
        getModel(id) = data PHẢI tồn tại, không có = lỗi.
        getModelOrNull(id) = data CÓ THỂ không tồn tại, null = hợp lệ.
        Không bao giờ try-catch getModel() để kiểm tra tồn tại — đó là anti-pattern.

    # --- Architecture Judgment ---
    - id: CP-08
      name: "Enrichment trong convertToModel — quyết định thiết kế, không phải rule cứng"
      weight: recommended
      principle: >
        Inject factory khác vào convertToModel() để enrich data chỉ hợp lý khi: source data có
        local cache (nhanh), tất cả consumer đều cần data này, và enrichment đơn giản (1 call).
        Bất kỳ điều kiện nào không thỏa → để caller tự handle.
      checklist:
        - "Source có local cache / lookup cực nhanh?"
        - "Tất cả consumer đều cần data bổ sung?"
        - "Enrichment đơn giản (1 factory call, không orchestration)?"

    - id: CP-09
      name: "Ba loại Factory — chọn đúng base class theo mục đích"
      weight: mandatory
      principle: >
        Câu hỏi đầu tiên KHÔNG phải "data lưu DB không?" mà là "standard CRUD cache có fit
        cho use case này không?".
        BaseCrudLocalCacheFactory: config/master data ít thay đổi, read-heavy, standard key-value cache.
        BaseCrudDataFactory: business data thay đổi thường xuyên, cần full CRUD, standard key-value cache.
        BaseDataFactory: bất kỳ trường hợp nào standard CRUD cache không fit — bao gồm:
        (a) data không lưu DB (OTP, session, auth confirm),
        (b) aggregated view (compose từ nhiều factory, cache kết quả),
        (c) custom cache structure (hash cache, custom key strategy),
        (d) custom lifecycle (distributed lock, event-driven sync).
      decision_tree: >
        Standard CRUD cache fit? →
        CÓ → Lưu DB? → CÓ → Thay đổi thường xuyên? → CÓ: BaseCrudDataFactory. KHÔNG: BaseCrudLocalCacheFactory.
        KHÔNG (hash cache, aggregation, custom cache, state machine...) → BaseDataFactory + custom extension points.

    - id: CP-10
      name: "Service = Strategy hoặc Cross-cutting — không phải default layer"
      weight: recommended
      principle: >
        Service chỉ dùng khi có mục đích cụ thể: Strategy pattern (nhiều variant cần polymorphic
        dispatch qua Manager) hoặc Cross-cutting operation (logic dùng chung nhiều handler/flow).
        Nếu logic chỉ phục vụ 1 handler và chỉ delegate factory calls → giữ trong Handler.

    - id: CP-11
      name: "Batch operations — không loop đơn lẻ"
      weight: recommended
      principle: >
        Khi cần tạo/xóa nhiều record, dùng createMany()/deleteMany() thay vì loop create()/delete().
        Batch operation = 1 lần cache invalidation thay vì N lần.

    - id: CP-12
      name: "Custom ≠ Bypass — customize BÊN TRONG framework, không đứng BÊN NGOÀI"
      weight: mandatory
      principle: >
        Khi cần behavior đặc biệt, override extension point (aroundGetModel, getModel, cacheFactory...)
        nhưng vẫn gọi framework hooks (preGetModel, postGetModel, decoratorModel, cachePutModel).
        Customize = tùy chỉnh 1 bước trong lifecycle. Bypass = bỏ qua lifecycle hoàn toàn.
        Nếu method của mình không đi qua bất kỳ framework hook nào → đang bypass, không phải custom.

    - id: CP-13
      name: "Framework là foundation — hỏi 'framework cung cấp gì?' trước khi viết mới"
      weight: recommended
      principle: >
        Trước khi viết logic custom, luôn hỏi: framework đã cung cấp gì cho mục đích này?
        Cache lifecycle? Access pattern chuẩn? Extension point? TTL config?
        Nếu framework có nền → build trên nó. Nếu không → mới viết từ đầu.
        Tư duy senior = nhìn thấy framework cung cấp cache lifecycle + chuẩn hóa access pattern →
        tận dụng nó cho mục đích riêng (aggregation, hash cache) mà không phá vỡ contract.

  reference_module: "transaction"
  reference_note: >
    Module transaction là code reference chuẩn cho toàn bộ philosophy này.
    Khi nghi ngờ cách triển khai, xem cách module transaction xử lý.
    Module approval-service (TransReqOverviewFactory, CompanyTransReqFactory) là reference cho
    advanced factory patterns: Aggregator, Hash Cache, custom cache strategy.

# ─────────────────────────────────────────────
# SECTION 9: Implementation Workflow Discipline
# Quy trình tư duy khi implement feature mới.
# Learned from: Phiên code review Lock/Unlock User Settings (2026-06-11)
# ─────────────────────────────────────────────
implementation_workflow:

  core_principle: >
    Feature delivery = end-to-end, từ entry point đến xử lý logic.
    Code chạy đúng chưa đủ — phải đảm bảo wiring hoàn chỉnh và có thể mở rộng.

  rules:
    - id: IW-01
      name: "Top-down: bắt đầu từ entry point, không phải logic xử lý"
      weight: mandatory
      principle: >
        Câu hỏi đầu tiên khi implement feature: "Ai gọi vào? Entry point ở đâu?"
        Thiết kế từ ngoài vào trong: entry point → orchestration → business logic.
        KHÔNG bắt đầu từ logic xử lý rồi quên wiring nó vào hệ thống.

    - id: IW-02
      name: "UI/Consumer drives API design"
      weight: mandatory
      scope: >
        Áp dụng cho flow có nhiều bước (multi-step).
        Không áp dụng cho query/listing đơn giản.
      principle: >
        Cấu trúc API được quyết định bởi consumer (UI, service khác), không phải backend.
        Khi consumer có bước xác nhận/verify trước khi submit → cần tách API tương ứng.
        Khi consumer không có bước đó → gộp trực tiếp.
        Backend benefits (cache, anti-tamper) là HỆ QUẢ của thiết kế consumer, không phải LÝ DO.

    - id: IW-03
      name: "Study-First: tham khảo feature có sẵn trước khi viết mới"
      weight: recommended
      scope: >
        Áp dụng khi đã có feature tương tự trong codebase.
        Không áp dụng khi viết feature hoàn toàn mới chưa có nguồn tham khảo.
      principle: >
        Khi codebase đã có feature cùng loại, trace flow hoàn chỉnh của feature đó trước.
        Hiểu pattern hiện có rồi mới viết mới theo đúng pattern.
        Khi không có feature tương tự → tự thiết kế, nhưng vẫn tuân thủ IW-01 và IW-04.

    - id: IW-04
      name: "Feature Completion Checklist: verify end-to-end trước khi giao"
      weight: mandatory
      principle: >
        Sau khi implement, tự kiểm tra: feature đã được wire đầy đủ từ entry point
        đến logic xử lý chưa? Mọi thành phần cần thiết cho loại feature này đã có chưa?
        Tự hỏi: "Nếu consumer gọi vào, request có đi được hết flow không?"
        Nếu có bất kỳ đoạn nào bị đứt (entry point thiếu, wiring chưa nối) → chưa hoàn thành.
