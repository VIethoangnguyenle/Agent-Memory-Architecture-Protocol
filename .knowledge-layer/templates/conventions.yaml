# SECTION 3: Design Patterns Detected
# ─────────────────────────────────────────────
design_patterns:
  - pattern: "Template Method — Financial Transaction"
    confidence: high
    origin: project
    weight: recommended
    evidence:
      - "BaseFinancialTransactionConfirmExecutor → InternalAccountTransferConfirmExecutor"
      - "BasePaymentConfirmExecutor → BillingPaymentConfirmExecutor"
      - "BaseInitTransReqActionHandler → specific Init*Handler"
    structure: "{Domain}ConfirmExecutor extends Base{TransactionType}ConfirmExecutor"
    note: "Core pattern cho mọi giao dịch tài chính. Base class xử lý lifecycle, concrete class xử lý business-specific logic."

  - pattern: "Interface + Implementation — Handler"
    confidence: high
    origin: both
    weight: recommended
    evidence:
      - "ICheckRootHandler → CheckRootHandler"
      - "ILockSoftOtpHandler → LockSoftOtpHandler"
      - "IAppServiceController → AppServiceController"
    structure: "I{Domain}Handler (interface) + {Domain}Handler (impl trong sub-package impl/)"
    note: "Upstream enforce. Project follow cho handlers, controllers, factories."

  - pattern: "Delegate Pattern — ConfirmExecutor"
    confidence: high
    origin: project
    weight: recommended
    evidence:
      - "IPaymentConfirmExecutorDelegate → BillingPaymentConfirmExecutorDelegate"
      - "IInternalTransferConfirmExecutorDelegate → InternalTransferConfirmExecutorDelegate"
      - "ICitadConfirmExecutorDelegate → CitadConfirmExecutorDelegate"
    structure: "I{Domain}ConfirmExecutorDelegate + Base{Type}ConfirmExecutorDelegate + {Domain}ConfirmExecutorDelegate"
    note: "Cho phép ConfirmExecutor delegate logic cụ thể sang Delegate class."

  - pattern: "ServiceDefinition Enum"
    confidence: high
    origin: project
    weight: recommended
    evidence:
      - "TransferTransactionServiceDefinition implements ITransactionServiceDefinition"
      - "BillingFinancialServiceDefinition"
      - "NapasTransactionServiceDefinition"
    structure: "{Domain}ServiceDefinition enum implements ITransactionServiceDefinition"
    note: "Mỗi loại giao dịch có 1 enum ServiceDefinition định nghĩa service code, tên dịch vụ."

  - pattern: "Maker-Checker Workflow"
    confidence: high
    origin: project
    weight: recommended
    evidence:
      - "BaseInitTransReqActionHandler (Init/Maker)"
      - "ConfirmTransReqHandler (Confirm/Checker)"
      - "BaseTransReqActionProcessor (Chain processor)"
    structure: "Init{Action}Handler → approval → Confirm{Action}Handler → ConfirmExecutor"
    note: "Flow chuẩn: Maker init → Checker approve → ConfirmExecutor execute."

  - pattern: "Event-Driven — Transaction Results"
    confidence: high
    origin: project
    weight: recommended
    evidence:
      - "IFinancialTransactionSuccessEvent → FinancialTransactionSuccessEventListener"
      - "IFinancialTransactionFailureEvent → FinancialTransactionFailureEventListener"
      - "IBatchConfirmFinancialTransactionSuccessEvent"
    structure: "I{Domain}{Result}Event (interface) + {Service}{Domain}{Result}EventListener (impl)"
    note: "Sau khi giao dịch hoàn thành (success/failure), phát event để các service khác xử lý."

  - pattern: "Channel-Specific Controller"
    confidence: medium
    origin: project
    weight: recommended
    evidence:
      - "BaseAppController (mobile)"
      - "BaseWebController (web browser)"
      - "IAppServiceController / IWebServiceController"
    structure: "{Channel}{Domain}Controller — Channel = App | Web"
    note: "Phân tách controller theo channel (App = mobile, Web = browser)."

  - pattern: "Factory Design Boundary"
    confidence: high
    origin: both
    weight: mandatory  # upstream enforce via IDataFactory / BaseCrudDataFactory
    evidence:
      - "PackageServiceTypeLimitFactory extends BaseCrudLocalCacheFactory (read-only config)"
      - "CusTransReqCheckFactory extends BaseCrudDataFactory (write-capable)"
      - "EtagFactory extends BaseCrudDataFactory (write-capable)"
    structure: "{Domain}Factory extends BaseCrud{Data|LocalCache}Factory"
    note: >
      Factory = Data Access Abstraction. Chỉ được chứa: Entity↔Model mapping (convertToModel,
      createConvertToEntity, updateConvertToEntity), query delegation (getEntity → Repository),
      cache config (getCacheClass, evictionSpec), error code (notFound).
      KHÔNG ĐƯỢC chứa: business logic, cross-reference Factory khác, orchestration,
      tự định nghĩa create/update/delete (đã có sẵn từ IDataFactory dvnh-common).
      Hai loại: BaseCrudLocalCacheFactory (read-heavy config, Caffeine+Redis) vs
      BaseCrudDataFactory (write support, Redis only).
    api_methods:
      inherited_from_dvnh_common:
        - "getModel(id): Lấy model, throw nếu not found"
        - "getModelOrNull(id): Lấy model, trả null nếu not found — dùng cho optional data"
        - "create(model): Tạo mới → gọi createConvertToEntity → save → convertToModel"
        - "update(model): Cập nhật → gọi updateConvertToEntity → save → convertToModel"
        - "delete(id): Xóa"
        - "getList(filter): Danh sách"
      factory_must_override:
        - "convertToModel(entity): Entity → Model"
        - "createConvertToEntity(model): Model → Entity (insert)"
        - "updateConvertToEntity(model, oldEntity): Model → Entity (update)"
        - "getEntity(id, filter): delegate → Repository"
        - "getCacheClass(): cache type config"
        - "notFound(): IErrorCode khi not found"

