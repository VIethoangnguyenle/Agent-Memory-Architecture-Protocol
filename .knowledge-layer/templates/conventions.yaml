    - name: "onboard-service"
      package: "vn.vnpay.omni.onboard_service"
    - name: "media-service"
      package: "vn.vnpay.omni.media_service"
  layers:
    - name: "handler"
      path_pattern: "**.module.{feature}.handler.**"
      responsibility: "Business logic entry point. Nhận request, xử lý, trả response."
    - name: "confirm_executor"
      path_pattern: "**.module.{feature}.handler.confirm_executor.**"
      responsibility: "Xử lý confirm giao dịch tài chính (Checker step)."
    - name: "delegate"
      path_pattern: "**.handler.confirm_executor.delegate.**"
      responsibility: "Delegate logic cho ConfirmExecutor (strategy/template method)."
    - name: "controller"
      path_pattern: "**.module.{feature}.controller.**"
      responsibility: "REST API endpoint (App/Web channel)."
    - name: "factory"
      path_pattern: "**.module.{feature}.factory.**"
      responsibility: "CRUD data factory — cache + DB access layer."
    - name: "entity"
      path_pattern: "**.module.{feature}.entity.**"
      responsibility: "JPA entity (persistence layer)."
    - name: "repository"
      path_pattern: "**.module.{feature}.repository.**"
      responsibility: "Spring Data JPA repository interface."
    - name: "model"
      path_pattern: "**.module.{feature}.model.**"
      responsibility: "Business model, request/response DTO."
    - name: "enumerate"
      path_pattern: "**.module.{feature}.enumerate.**"
      responsibility: "Enum constants (ServiceDefinition, ErrorCode, Status...)."
    - name: "chain"
      path_pattern: "**.module.{feature}.chain.**"
      responsibility: "Chain of Responsibility processors."
    - name: "event"
      path_pattern: "**.module.{feature}.event.**"
      responsibility: "Spring ApplicationEvent + EventListener."
    - name: "consumer"
      path_pattern: "**.module.{feature}.consumer.**"
      responsibility: "Kafka consumer."
    - name: "configuration"
      path_pattern: "**.config.**"
      responsibility: "Spring @Configuration beans."
  architecture_style: "layered + template-method"
  note: "Mỗi service là 1 Spring Boot app. Trong mỗi service, code tổ chức theo module/{feature}/{layer}. Giao dịch tài chính dùng Template Method pattern (Base → Concrete)."

